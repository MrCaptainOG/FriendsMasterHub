openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FriendsMasterHub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: server
  - name: builds
  - name: bot
  - name: auth
  - name: users
  - name: items
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /server/status:
    get:
      operationId: getServerStatus
      tags: [server]
      summary: Get Minecraft server status
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register with game usertag and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with game usertag and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      parameters:
        - in: query
          name: usertag
          required: true
          schema:
            type: string
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /builds:
    get:
      operationId: getBuilds
      tags: [builds]
      summary: Get all approved builds (public gallery)
      responses:
        "200":
          description: List of approved builds
          content:
            application/json:
              schema:
                type: object
                properties:
                  builds:
                    type: array
                    items:
                      $ref: "#/components/schemas/Build"
                required: [builds]

    post:
      operationId: submitBuild
      tags: [builds]
      summary: Submit a new build image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitBuildRequest"
      responses:
        "201":
          description: Build submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /builds/admin:
    get:
      operationId: getAdminBuilds
      tags: [builds]
      summary: Get all builds (admin)
      parameters:
        - in: query
          name: password
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All builds
          content:
            application/json:
              schema:
                type: object
                properties:
                  builds:
                    type: array
                    items:
                      $ref: "#/components/schemas/Build"
                required: [builds]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /builds/{id}/status:
    patch:
      operationId: updateBuildStatus
      tags: [builds]
      summary: Update build status (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: password
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBuildStatusRequest"
      responses:
        "200":
          description: Build updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /builds/{id}/award:
    post:
      operationId: awardBuild
      tags: [builds]
      summary: Award credits to a build uploader
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: password
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AwardBuildRequest"
      responses:
        "200":
          description: Credits awarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AwardResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [users]
      summary: Get all users with credentials (admin)
      parameters:
        - in: query
          name: password
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
                required: [users]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/credits:
    patch:
      operationId: adjustUserCredits
      tags: [users]
      summary: Add or remove credits from a user (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: password
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustCreditsRequest"
      responses:
        "200":
          description: Credits updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /items:
    get:
      operationId: getItems
      tags: [items]
      summary: Get all shop items
      responses:
        "200":
          description: Items list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ShopItem"
                required: [items]

    post:
      operationId: createItem
      tags: [items]
      summary: Create shop item (admin)
      parameters:
        - in: query
          name: password
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertItemRequest"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /items/{id}:
    patch:
      operationId: updateItem
      tags: [items]
      summary: Edit shop item (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: password
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete shop item (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: password
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /items/{id}/buy:
    post:
      operationId: buyItem
      tags: [items]
      summary: Buy a shop item with credits
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyItemRequest"
      responses:
        "200":
          description: Purchase successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyItemResponse"
        "400":
          description: Insufficient credits or error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ServerStatus:
      type: object
      properties:
        online:
          type: boolean
        players:
          type: object
          properties:
            online:
              type: integer
            max:
              type: integer
          required: [online, max]
        version:
          type: string
        motd:
          type: string
        address:
          type: string
        port:
          type: integer
      required: [online, address, port]

    AuthRequest:
      type: object
      properties:
        usertag:
          type: string
        password:
          type: string
      required: [usertag, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        usertag:
          type: string
        credits:
          type: integer
      required: [token, usertag, credits]

    UserProfile:
      type: object
      properties:
        _id:
          type: string
        usertag:
          type: string
        credits:
          type: integer
        createdAt:
          type: string
      required: [_id, usertag, credits, createdAt]

    AdminUser:
      type: object
      properties:
        _id:
          type: string
        usertag:
          type: string
        password:
          type: string
        credits:
          type: integer
        createdAt:
          type: string
      required: [_id, usertag, password, credits, createdAt]

    AdjustCreditsRequest:
      type: object
      properties:
        amount:
          type: integer
          description: Positive to add, negative to remove
      required: [amount]

    Build:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        uploaderName:
          type: string
        status:
          type: string
          enum: [unchecked, approved, rejected, awarded]
        rejectedAt:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [_id, title, description, imageUrl, uploaderName, status, createdAt]

    SubmitBuildRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageBase64:
          type: string
        uploaderName:
          type: string
      required: [title, description, imageBase64, uploaderName]

    UpdateBuildStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [unchecked, approved, rejected, awarded]
      required: [status]

    AwardBuildRequest:
      type: object
      properties:
        credits:
          type: integer
      required: [credits]

    AwardResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        newCredits:
          type: integer
      required: [success, message]

    ShopItem:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        creditPrice:
          type: integer
        createdAt:
          type: string
      required: [_id, title, creditPrice, createdAt]

    UpsertItemRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageBase64:
          type: string
          nullable: true
        creditPrice:
          type: integer
      required: [title, creditPrice]

    BuyItemRequest:
      type: object
      properties:
        usertag:
          type: string
        token:
          type: string
      required: [usertag, token]

    BuyItemResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        remainingCredits:
          type: integer
      required: [success, message, remainingCredits]

    BotStatus:
      type: object
      properties:
        connected:
          type: boolean
        username:
          type: string
        health:
          type: number
        food:
          type: number
        position:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
            z:
              type: number
        pingMs:
          type: number
        uptime:
          type: integer
        activityLog:
          type: array
          items:
            type: string
        pendingAwards:
          type: integer
      required: [connected, username, activityLog]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
